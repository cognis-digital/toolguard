apiVersion: apps/v1
kind: Deployment
metadata: { name: toolguard, labels: { app: toolguard } }
spec:
  replicas: 1
  selector: { matchLabels: { app: toolguard } }
  template:
    metadata: { labels: { app: toolguard } }
    spec:
      containers:
        - name: toolguard
          image: ghcr.io/cognis-digital/toolguard:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: toolguard }
spec:
  selector: { app: toolguard }
  ports: [{ port: 80, targetPort: 8000 }]
